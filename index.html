<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cute Collab Art ✨</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root {
            --primary: #ffafcc;
            --secondary: #bde0fe;
            --accent: #ffc8dd;
            --glass: rgba(255, 255, 255, 0.7);
        }

        * { touch-action: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: linear-gradient(45deg, #ffafcc, #bde0fe, #ffc8dd, #a2d2ff);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism UI */
        .toolbar {
            position: fixed; bottom: 20px;
            width: 90%; max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 2px solid white;
            border-radius: 25px;
            padding: 15px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
            flex-wrap: wrap; gap: 10px;
        }

        #canvas-container {
            width: 95vw; height: 75vh;
            margin-top: 20px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 5px solid white;
            position: relative;
        }

        canvas { width: 100%; height: 100%; border-radius: 25px; }

        /* Login Screen */
        #login {
            position: fixed; inset: 0; background: var(--accent);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000;
        }

        .login-card {
            background: white; padding: 30px; border-radius: 30px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        input[type="text"] {
            padding: 12px; border: 2px solid var(--primary);
            border-radius: 15px; margin-bottom: 15px; outline: none;
        }

        .btn {
            background: var(--primary); color: white; border: none;
            padding: 10px 25px; border-radius: 15px; cursor: pointer;
            font-weight: bold; font-size: 1rem;
        }

        /* Color Palette */
        .colors { display: flex; gap: 8px; }
        .color-dot {
            width: 30px; height: 30px; border-radius: 50%;
            cursor: pointer; border: 2px solid white;
            transition: transform 0.2s;
        }
        .color-dot:active { transform: scale(1.2); }

    </style>
</head>
<body>

    <div id="login">
        <div class="login-card">
            <h2 style="color: #ff8fab;">Artist Studio ✨</h2>
            <input type="text" id="username" placeholder="Apna naam likho...">
            <br>
            <button class="btn" onclick="initApp()">Start Drawing</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="toolbar">
        <div class="colors">
            <div class="color-dot" style="background: #ff595e;" onclick="setColor('#ff595e')"></div>
            <div class="color-dot" style="background: #ffca3a;" onclick="setColor('#ffca3a')"></div>
            <div class="color-dot" style="background: #8ac926;" onclick="setColor('#8ac926')"></div>
            <div class="color-dot" style="background: #1982c4;" onclick="setColor('#1982c4')"></div>
            <div class="color-dot" style="background: #6a4c93;" onclick="setColor('#6a4c93')"></div>
            <div class="color-dot" style="background: #000000;" onclick="setColor('#000000')"></div>
        </div>
        <input type="range" id="size" min="2" max="20" value="5">
        <button class="btn" style="background: #ffc8dd; color: #555;" onclick="clearCanvas()">Clear</button>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let currentColor = '#ff595e';
        let currentSize = 5;
        let ably, channel;

        // Resize canvas for high quality
        function resize() {
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
            ctx.scale(2, 2);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        window.addEventListener('resize', resize);
        resize();

        async function initApp() {
            const name = document.getElementById('username').value;
            if (!name) return alert("Pehle naam toh likho! 🌸");
            
            document.getElementById('login').style.display = 'none';

            // IMPORTANT: Replace 'YOUR_ABLY_API_kEY' with real key from ably.com
            ably = new Ably.Realtime('FQA7Bw.f2UQ6A:TA2RVyMWcUH1sOVy9j1BFSNqVaVOzkv88WvTd7pKNOg'); 
            channel = ably.channels.get('drawing-room');

            // Listen for other users' drawing
            channel.subscribe('draw', (msg) => {
                if (msg.clientId !== ably.auth.clientId) {
                    remoteDraw(msg.data);
                }
            });

            channel.subscribe('clear', () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });
        }

        function setColor(c) { currentColor = c; }
        document.getElementById('size').oninput = (e) => currentSize = e.target.value;

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left),
                y: (clientY - rect.top)
            };
        }

        function start(e) {
            drawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function move(e) {
            if (!drawing) return;
            const pos = getPos(e);
            
            const drawData = {
                x: pos.x,
                y: pos.y,
                color: currentColor,
                size: currentSize,
                type: 'move'
            };

            localDraw(drawData);
            if (channel) channel.publish('draw', drawData);
        }

        function stop() {
            drawing = false;
        }

        function localDraw(data) {
            ctx.strokeStyle = data.color;
            ctx.lineWidth = data.size;
            ctx.lineTo(data.x, data.y);
            ctx.stroke();
        }

        function remoteDraw(data) {
            ctx.strokeStyle = data.color;
            ctx.lineWidth = data.size;
            ctx.lineTo(data.x, data.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(data.x, data.y);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (channel) channel.publish('clear', {});
        }

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); });
        canvas.addEventListener('touchend', stop);

    </script>
</body>
  </html>
