<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Pastel Draw ✨</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.8);
            --border: rgba(255, 255, 255, 0.5);
            --shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        * { touch-action: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: #fdf0f6; /* Soft Peach White */
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; overflow: hidden;
            display: flex;
        }

        /* Side Toolbar - Drawing Pad Style */
        .sidebar {
            width: 80px; height: 90vh;
            background: var(--glass);
            backdrop-filter: blur(10px);
            margin: auto 15px;
            border-radius: 40px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-around;
            padding: 20px 0;
            border: 2px solid var(--border);
            box-shadow: var(--shadow);
            z-index: 100;
        }

        #canvas-container {
            flex-grow: 1; height: 95vh;
            margin: auto 20px auto 0;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05), var(--shadow);
            position: relative;
        }

        canvas { width: 100%; height: 100%; border-radius: 30px; cursor: crosshair; }

        /* Custom Color Dots */
        .color-group { display: flex; flex-direction: column; gap: 12px; }
        .dot {
            width: 35px; height: 35px; border-radius: 50%;
            cursor: pointer; border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .dot:active { transform: scale(1.3); }
        .dot.active { border-color: #555; transform: scale(1.1); }

        /* Tool Icons */
        .tool-icon { font-size: 1.5rem; cursor: pointer; filter: grayscale(0.5); transition: 0.3s; }
        .tool-icon:hover { filter: grayscale(0); transform: scale(1.1); }

        #login {
            position: fixed; inset: 0; background: #ffc8dd;
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }

        .login-card {
            background: white; padding: 40px; border-radius: 40px;
            text-align: center; box-shadow: var(--shadow);
        }

        input { padding: 15px; border: 2px solid #ffafcc; border-radius: 20px; margin-bottom: 20px; outline: none; width: 200px; }
        .btn-start { background: #ff8fab; color: white; border: none; padding: 12px 30px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* Brush Size Slider Side View */
        .slider-container { transform: rotate(-90deg); width: 100px; margin: 40px 0; }
    </style>
</head>
<body>

    <div id="login">
        <div class="login-card">
            <h1 style="color: #ff8fab; margin-bottom: 10px;">Art Studio ✨</h1>
            <p style="color: #888;">Collab with friends lag-free</p>
            <input type="text" id="username" placeholder="Aapka Naam..."><br>
            <button class="btn-start" onclick="initApp()">Enter Studio</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="tool-icon" onclick="setTool('brush')">🖌️</div>
        <div class="color-group">
            <div class="dot active" style="background: #FF595E;" onclick="setCol('#FF595E', this)"></div>
            <div class="dot" style="background: #FF924C;" onclick="setCol('#FF924C', this)"></div>
            <div class="dot" style="background: #FFCA3A;" onclick="setCol('#FFCA3A', this)"></div>
            <div class="dot" style="background: #8AC926;" onclick="setCol('#8AC926', this)"></div>
            <div class="dot" style="background: #1982C4;" onclick="setCol('#1982C4', this)"></div>
            <div class="dot" style="background: #6A4C93;" onclick="setCol('#6A4C93', this)"></div>
            <div class="dot" style="background: #000000;" onclick="setCol('#000000', this)"></div>
        </div>
        
        <div class="slider-container">
            <input type="range" id="brushWidth" min="2" max="30" value="6">
        </div>

        <div class="tool-icon" onclick="clearAll()">🗑️</div>
    </div>

    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0; let lastY = 0;
        let color = '#FF595E';
        let width = 6;
        let ably, channel;

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        window.addEventListener('resize', resize);
        resize();

        async function initApp() {
            if(!document.getElementById('username').value) return;
            document.getElementById('login').style.display = 'none';

            // ABly Integration
            ably = new Ably.Realtime('FQA7Bw.f2UQ6A:TA2RVyMWcUH1sOVy9j1BFSNqVaVOzkv88WvTd7pKNOg');
            channel = ably.channels.get('art-room');

            channel.subscribe('draw', (m) => {
                if(m.clientId !== ably.auth.clientId) remoteDraw(m.data);
            });

            channel.subscribe('clear', () => ctx.clearRect(0,0,canvas.width,canvas.height));
        }

        function setCol(c, el) {
            color = c;
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        document.getElementById('brushWidth').oninput = (e) => width = e.target.value;

        function draw(x, y, isRemote = false, remoteColor, remoteWidth, remoteLastX, remoteLastY) {
            ctx.beginPath();
            ctx.strokeStyle = isRemote ? remoteColor : color;
            ctx.lineWidth = isRemote ? remoteWidth : width;
            ctx.moveTo(isRemote ? remoteLastX : lastX, isRemote ? remoteLastY : lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.closePath();
        }

        function handleStart(e) {
            isDrawing = true;
            const { x, y } = getCoords(e);
            [lastX, lastY] = [x, y];
        }

        function handleMove(e) {
            if (!isDrawing) return;
            const { x, y } = getCoords(e);
            
            draw(x, y);
            
            if(channel) {
                channel.publish('draw', { x, y, lastX, lastY, color, width });
            }
            [lastX, lastY] = [x, y];
        }

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        function remoteDraw(data) {
            draw(data.x, data.y, true, data.color, data.width, data.lastX, data.lastY);
        }

        function clearAll() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            channel.publish('clear', {});
        }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => isDrawing = false);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); });
        canvas.addEventListener('touchend', () => isDrawing = false);

    </script>
</body>
</html>
